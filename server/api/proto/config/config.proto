syntax = "proto3";

package config;

option go_package = "gitee.com/liujit/shop/server/api/config;config";

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";

import "common/enum.proto";

// 系统配置公共服务
service ConfigService {
  // 获取系统配置
  rpc GetConfig (ConfigRequest) returns (ConfigResponse) {
    option (google.api.http) = {
      get: "/api/config"
    };
  }
}

message ConfigRequest {
  common.BaseConfigSite site = 2 [
    (gnostic.openapi.v3.property) = {description: "位置：枚举【BaseConfigSite】"}
  ];  // 位置：枚举【BaseConfigSite】
}

message ConfigResponse {
  message Data {
    string key = 1 [
      (gnostic.openapi.v3.property) = {description: "配置key"}
    ];  // 配置key

    string value = 2 [
      (gnostic.openapi.v3.property) = {description: "配置value"}
    ];  // 配置value
  }

  repeated Data data = 1 [
    (gnostic.openapi.v3.property) = {
      description: "系统配置"
    }
  ]; // 系统配置
}
