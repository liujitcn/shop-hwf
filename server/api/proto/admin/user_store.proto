syntax = "proto3";

package admin;

option go_package = "gitee.com/liujit/shop/server/api/admin;admin";

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "common/common.proto";
import "common/enum.proto";

// Admin用户门店管理服务
service UserStoreService {
  // 查询用户门店列表
  rpc PageUserStore (PageUserStoreRequest) returns (PageUserStoreResponse) {
    option (google.api.http) = {
      get: "/api/admin/user/store"
    };
  }
  
  // 查询用户门店
  rpc GetUserStore (google.protobuf.Int64Value) returns (UserStore) {
    option (google.api.http) = {
      get: "/api/admin/user/store/{value}"
    };
  }

  // 门店认证
  rpc AuditUserStore (AuditUserStoreForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/user/store/{id}/audit"
      body: "*"
    };
  }
}

message PageUserStoreRequest{
  // 门店名称
  string name = 1 [
    (gnostic.openapi.v3.property) = {
      description: "门店名称",
    }
  ];

  // 状态
  optional common.UserStoreStatus status = 100 [
    (gnostic.openapi.v3.property) = {
      description: "状态",
      default: {number: 0}
    }
  ];

  // 当前页码
  int64 pageNum = 101 [
    (gnostic.openapi.v3.property) = {
      description: "当前页码",
      default: {number: 1}
    }
  ];

  // 每一页的行数
  int64 pageSize = 102 [
    (gnostic.openapi.v3.property) = {
      description: "每一页的行数",
      default: {number: 10}
    }
  ];
}

message PageUserStoreResponse{
  // 分页数据
  repeated UserStore list = 1;
  // 总数
  int32 total = 2;
}

message AuditUserStoreForm {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "用户门店ID"}
  ];  // 用户门店ID

  common.UserStoreStatus status = 51 [
    (gnostic.openapi.v3.property) = {description: "状态"}
  ];  // 状态

  string remark = 52 [
    (gnostic.openapi.v3.property) = {description: "备注名"}
  ]; // 备注名
}

// 用户门店信息
message UserStore {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "用户门店ID"}
  ];  // 用户门店ID
  string name = 2 [
    (gnostic.openapi.v3.property) = {description: "门店名称"}
  ];  // 门店名称
  repeated string address = 3 [
    (gnostic.openapi.v3.property) = {description: "省市区"}
  ];  // 省市区
  string detail = 4 [
    (gnostic.openapi.v3.property) = {description: "详细地址"}
  ];  // 详细地址
  repeated string picture = 5 [
    (gnostic.openapi.v3.property) = {description: "门店照片"}
  ];  // 门店照片
  repeated string businessLicense = 6 [
    (gnostic.openapi.v3.property) = {description: "营业执照"}
  ];  // 营业执照

  common.UserStoreStatus status = 51 [
    (gnostic.openapi.v3.property) = {description: "状态"}
  ];  // 状态

  string remark = 52 [
    (gnostic.openapi.v3.property) = {description: "备注名"}
  ]; // 备注名

  string nickName = 100 [
    (gnostic.openapi.v3.property) = {description: "联系人"}
  ];  // 联系人

  string phone = 101 [
    (gnostic.openapi.v3.property) = {description: "手机号"}
  ];  // 手机号
}
