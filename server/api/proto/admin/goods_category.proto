syntax = "proto3";

package admin;

option go_package = "gitee.com/liujit/shop/server/api/admin;admin";

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

import "common/common.proto";
import "common/enum.proto";

// Admin分类服务
service GoodsCategoryService {
  // 查询分类树形列表
  rpc TreeGoodsCategory (google.protobuf.Empty) returns (TreeGoodsCategoryResponse) {
    option (google.api.http) = {
      get: "/api/admin/goods/category/tree"
    };
  }

  // 查询分类树形选择
  rpc OptionGoodsCategory (OptionGoodsCategoryRequest) returns (common.TreeOptionResponse) {
    option (google.api.http) = {
      get: "/api/admin/goods/category/option"
    };
  }

  // 查询分类
  rpc GetGoodsCategory (google.protobuf.Int64Value) returns (GoodsCategoryForm) {
    option (google.api.http) = {
      get: "/api/admin/goods/category/{value}"
    };
  }

  // 创建分类
  rpc CreateGoodsCategory (GoodsCategoryForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/admin/goods/category"
      body: "*"
    };
  }

  // 更新分类
  rpc UpdateGoodsCategory (GoodsCategoryForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/goods/category/{id}"
      body: "*"
    };
  }

  // 删除分类
  rpc DeleteGoodsCategory (google.protobuf.StringValue) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/admin/goods/category/{value}"
    };
  }

  // 设置状态
  rpc SetGoodsCategoryStatus (common.SetStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/goods/category/{id}/status"
      body: "*"
    };
  }
}

message TreeGoodsCategoryRequest {

  optional int64 parentId = 2 [
    (gnostic.openapi.v3.property) = {description: "父级分类ID"}
  ];  // 父级分类ID

  // 分类名称
  string name = 3 [
    (gnostic.openapi.v3.property) = {
      description: "分类名称",
    }
  ];

  // 状态
  optional common.Status status = 100 [
    (gnostic.openapi.v3.property) = {
      description: "状态",
    }
  ];
}

message TreeGoodsCategoryResponse {
  // 分页数据
  repeated GoodsCategory list = 1;
}

message OptionGoodsCategoryRequest {
  optional int64 parentId = 1 [
    (gnostic.openapi.v3.property) = {description: "父级分类ID"}
  ];  // 父级分类ID
}

// 分类
message GoodsCategory {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "分类ID"}
  ];  // 分类ID

  int64 parentId = 2 [
    (gnostic.openapi.v3.property) = {description: "父级分类ID"}
  ];  // 父级分类ID

  string name = 3 [
    (gnostic.openapi.v3.property) = {description: "分类名称"}
  ];  // 分类名称

  string picture = 4 [
    (gnostic.openapi.v3.property) = {description: "分类图片"}
  ];  // 分类图片

  int32 sort = 5 [
    (gnostic.openapi.v3.property) = { description: "排序" }
  ]; // 排序

  common.Status status = 50 [
    (gnostic.openapi.v3.property) = { description: "菜单状态" }
  ]; // 菜单状态

  string createdAt = 200 [
    (gnostic.openapi.v3.property) = {description: "创建时间"}
  ];// 创建时间
  string updatedAt = 201 [
    (gnostic.openapi.v3.property) = {description: "更新时间"}
  ];// 更新时间

  repeated GoodsCategory children = 301 [
    (gnostic.openapi.v3.property) = {description: "子节点树"}
  ];  // 子节点树
}

// 分类
message GoodsCategoryForm {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "分类ID"}
  ];  // 分类ID

  optional int64 parentId = 2 [
    (gnostic.openapi.v3.property) = {description: "父级分类ID"}
  ];  // 父级分类ID

  string name = 3 [
    (gnostic.openapi.v3.property) = {description: "分类名称"}
  ];  // 分类名称

  string picture = 4 [
    (gnostic.openapi.v3.property) = {description: "分类图片"}
  ];  // 分类图片

  int32 sort = 5 [
    (gnostic.openapi.v3.property) = { description: "排序" }
  ]; // 排序

  optional common.Status status = 50 [
    (gnostic.openapi.v3.property) = { description: "菜单状态" }
  ]; // 菜单状态
}
