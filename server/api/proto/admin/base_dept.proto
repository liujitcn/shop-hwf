syntax = "proto3";

package admin;

option go_package = "gitee.com/liujit/shop/server/api/admin;admin";

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

import "common/common.proto";
import "common/enum.proto";

// Admin部门服务
service BaseDeptService {
  // 查询部门树形列表
  rpc TreeBaseDept (google.protobuf.Empty) returns (TreeBaseDeptResponse) {
    option (google.api.http) = {
      get: "/api/admin/base/dept/tree"
    };
  }

  // 查询部门树形选择
  rpc OptionBaseDept (OptionBaseDeptRequest) returns (common.TreeOptionResponse) {
    option (google.api.http) = {
      get: "/api/admin/base/dept/option"
    };
  }

  // 查询部门
  rpc GetBaseDept (google.protobuf.Int64Value) returns (BaseDeptForm) {
    option (google.api.http) = {
      get: "/api/admin/base/dept/{value}"
    };
  }

  // 创建部门
  rpc CreateBaseDept (BaseDeptForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/admin/base/dept"
      body: "*"
    };
  }

  // 更新部门
  rpc UpdateBaseDept (BaseDeptForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/base/dept/{id}"
      body: "*"
    };
  }

  // 删除部门
  rpc DeleteBaseDept (google.protobuf.StringValue) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/admin/base/dept/{value}"
    };
  }

  // 设置状态
  rpc SetBaseDeptStatus (common.SetStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/base/dept/{id}/status"
      body: "*"
    };
  }
}

message TreeBaseDeptRequest {
  optional int64 parentId = 2 [
    (gnostic.openapi.v3.property) = {description: "父级部门ID"}
  ];  // 父级部门ID

  string name = 3 [
    (gnostic.openapi.v3.property) = {description: "部门名称"}
  ];  // 部门名称

  common.Status status = 100 [
    (gnostic.openapi.v3.property) = { description: "状态" }
  ]; // 状态
}

message TreeBaseDeptResponse {
  // 分页数据
  repeated BaseDept list = 1;
}

message OptionBaseDeptRequest {
  optional int64 parentId = 2 [
    (gnostic.openapi.v3.property) = {description: "父级部门ID"}
  ];  // 父级部门ID
}

// 部门
message BaseDept {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "部门ID"}
  ];  // 部门ID

  int64 parentId = 2 [
    (gnostic.openapi.v3.property) = {description: "父级部门ID"}
  ];  // 父级部门ID

  string name = 3 [
    (gnostic.openapi.v3.property) = {description: "部门名称"}
  ];  // 部门名称

  int32 sort = 4 [
    (gnostic.openapi.v3.property) = { description: "排序" }
  ]; // 排序

  common.Status status = 100 [
    (gnostic.openapi.v3.property) = { description: "状态" }
  ]; // 状态

  string remark = 101 [
    (gnostic.openapi.v3.property) = {description: "备注"}
  ];  // 备注

  string createdAt = 200 [
    (gnostic.openapi.v3.property) = {description: "创建时间"}
  ];// 创建时间
  string updatedAt = 201 [
    (gnostic.openapi.v3.property) = {description: "更新时间"}
  ];// 更新时间

  repeated BaseDept children = 300 [
    (gnostic.openapi.v3.property) = {description: "子部门"}
  ];  // 子部门
}

// 部门
message BaseDeptForm {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "部门ID"}
  ];  // 部门ID

  optional int64 parentId = 2 [
    (gnostic.openapi.v3.property) = {description: "父级部门ID"}
  ];  // 父级部门ID

  string name = 3 [
    (gnostic.openapi.v3.property) = {description: "部门名称"}
  ];  // 部门名称

  int32 sort = 4 [
    (gnostic.openapi.v3.property) = { description: "排序" }
  ]; // 排序

  optional common.Status status = 100 [
    (gnostic.openapi.v3.property) = { description: "状态" }
  ]; // 状态

  string remark = 101 [
    (gnostic.openapi.v3.property) = {description: "备注"}
  ];  // 备注
}
