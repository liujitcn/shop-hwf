syntax = "proto3";

package admin;

option go_package = "gitee.com/liujit/shop/server/api/admin;admin";

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

import "common/common.proto";
import "common/enum.proto";

// Admin系统配置服务
service BaseConfigService {
  // 刷新缓存
  rpc RefreshBaseConfig (google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/admin/base/config/refresh"
      body: "*"
    };
  }

  // 查询系统配置分页列表
  rpc PageBaseConfig (PageBaseConfigRequest) returns (PageBaseConfigResponse) {
    option (google.api.http) = {
      get: "/api/admin/base/config"
    };
  }

  // 查询系统配置
  rpc GetBaseConfig (google.protobuf.Int64Value) returns (BaseConfigForm) {
    option (google.api.http) = {
      get: "/api/admin/base/config/{value}"
    };
  }

  // 创建系统配置
  rpc CreateBaseConfig (BaseConfigForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/admin/base/config"
      body: "*"
    };
  }

  // 更新系统配置
  rpc UpdateBaseConfig (BaseConfigForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/base/config/{id}"
      body: "*"
    };
  }

  // 删除系统配置
  rpc DeleteBaseConfig (google.protobuf.StringValue) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/admin/base/config/{value}"
    };
  }

  // 设置状态
  rpc SetBaseConfigStatus (common.SetStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/base/config/{id}/status"
      body: "*"
    };
  }
}

message PageBaseConfigRequest{

  optional common.BaseConfigSite site = 2 [
    (gnostic.openapi.v3.property) = {description: "位置：枚举【BaseConfigSite】"}
  ];  // 位置：枚举【BaseConfigSite】

  optional string name = 3 [
    (gnostic.openapi.v3.property) = {description: "配置名称"}
  ];  // 配置名称

  optional common.BaseConfigType type = 4 [
    (gnostic.openapi.v3.property) = {description: "配置类型：枚举【BaseConfigType】"}
  ];  // 配置类型：枚举【BaseConfigType】

  optional string key = 5 [
    (gnostic.openapi.v3.property) = {description: "配置key"}
  ];  // 配置key

  // 状态：枚举【Status】
  optional common.Status status = 100 [
    (gnostic.openapi.v3.property) = {
      description: "状态：枚举【Status】",
    }
  ];

  // 当前页码
  int64 pageNum = 101 [
    (gnostic.openapi.v3.property) = {
      description: "当前页码",
      default: {number: 1}
    }
  ];

  // 每一页的行数
  int64 pageSize = 102 [
    (gnostic.openapi.v3.property) = {
      description: "每一页的行数",
      default: {number: 10}
    }
  ];
}

message PageBaseConfigResponse{
  // 分页数据
  repeated BaseConfig list = 1;
  // 总数
  int32 total = 2;
}

message BaseConfig {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "配置ID"}
  ];  // 配置ID

  common.BaseConfigSite site = 2 [
    (gnostic.openapi.v3.property) = {description: "位置：枚举【BaseConfigSite】"}
  ];  // 位置：枚举【BaseConfigSite】

  string name = 3 [
    (gnostic.openapi.v3.property) = {description: "配置名称"}
  ];  // 配置名称

  common.BaseConfigType type = 4 [
    (gnostic.openapi.v3.property) = {description: "配置类型：枚举【BaseConfigType】"}
  ];  // 配置类型：枚举【BaseConfigType】

  string key = 5 [
    (gnostic.openapi.v3.property) = {description: "配置key"}
  ];  // 配置key

  string value = 6 [
    (gnostic.openapi.v3.property) = {description: "配置value"}
  ];  // 配置value

  common.Status status = 100 [
    (gnostic.openapi.v3.property) = {
      description: "状态：枚举【Status】",
    }
  ]; // 状态：枚举【Status】

  string createdAt = 200 [
    (gnostic.openapi.v3.property) = {description: "创建时间"}
  ];// 创建时间
  string updatedAt = 201 [
    (gnostic.openapi.v3.property) = {description: "更新时间"}
  ];// 更新时间
}

message BaseConfigForm {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "配置ID"}
  ];  // 配置ID

  optional common.BaseConfigSite site = 2 [
    (gnostic.openapi.v3.property) = {description: "位置：枚举【BaseConfigSite】"}
  ];  // 位置：枚举【BaseConfigSite】

  string name = 3 [
    (gnostic.openapi.v3.property) = {description: "配置名称"}
  ];  // 配置名称

  optional common.BaseConfigType type = 4 [
    (gnostic.openapi.v3.property) = {description: "配置类型：1、文本，2、图片。3、富文本"}
  ];  // 配置类型：1、文本，2、图片。3、富文本

  string key = 5 [
    (gnostic.openapi.v3.property) = {description: "配置key"}
  ];  // 配置key

  string value = 6 [
    (gnostic.openapi.v3.property) = {description: "配置value"}
  ];  // 配置value

  optional common.Status status = 51 [
    (gnostic.openapi.v3.property) = { description: "状态" }
  ]; // 状态
}
