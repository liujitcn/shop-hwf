syntax = "proto3";

package admin;

option go_package = "gitee.com/liujit/shop/server/api/admin;admin";

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/any.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/wrappers.proto";

import "login/login.proto";

// Admin用户登录认证服务
service AuthService {
  // 登录
  rpc Login (login.LoginRequest) returns (login.LoginResponse) {
    option (google.api.http) = {
      post: "/api/admin/auth/login"
      body: "*"
    };
  }

  // 获取已经登录的用户的数据
  rpc GetUserInfo (google.protobuf.Empty) returns (UserInfo) {
    option (google.api.http) = {
      get: "/api/admin/auth/userInfo"
    };
  }

  // 获取已经登录的用户菜单
  rpc GetUserMenu (google.protobuf.Empty) returns (TreeRouteResponse) {
    option (google.api.http) = {
      get: "/api/admin/auth/menu"
    };
  }

  // 获取个人中心用户信息
  rpc GetUserProfile (google.protobuf.Empty) returns (UserProfileForm) {
    option (google.api.http) = {
      get: "/api/admin/auth/userProfile"
    };
  }

  // 修改个人中心用户信息
  rpc UpdateUserProfile (UserProfileForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/auth/update/userProfile"
      body: "*"
    };
  }

  // 发送手机号验证码
  rpc SendUpdatePhoneCode (SendUpdatePhoneCodeForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/admin/auth/send/update/phone"
      body: "*"
    };
  }

  // 修改个人中心手机号
  rpc UpdateUserPhone (UpdatePhoneForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/auth/update/phone"
      body: "*"
    };
  }

  // 修改个人中心密码
  rpc UpdateUserPwd (UpdatePwdForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/auth/update/pwd"
      body: "*"
    };
  }
}

message UserInfo {
  string userName = 1 [
    (gnostic.openapi.v3.property) = {description: "用户账号"}
  ]; // 用户账号

  string nickName = 2 [
    (gnostic.openapi.v3.property) = {description: "用户昵称"}
  ]; // 用户昵称

  string phone = 3 [
    (gnostic.openapi.v3.property) = {description: "手机号"}
  ]; // 手机号

  string avatar = 4 [
    (gnostic.openapi.v3.property) = {description: "头像"}
  ]; // 头像

  repeated string permission = 80 [
    (gnostic.openapi.v3.property) = {description: "权限"}
  ]; //权限

  string roleCode = 100 [
    (gnostic.openapi.v3.property) = {description: "角色编号"}
  ];  // 角色编号
}

message TreeRouteResponse {
  repeated RouteItem list = 1;
}

// 路由项
message RouteItem {
  optional string path = 1 [
    (gnostic.openapi.v3.property) = {
      description: "路由路径"
    }
  ]; // 路由路径

  optional string redirect = 2 [
    (gnostic.openapi.v3.property) = {
      description: "重定向地址"
    }
  ]; // 重定向地址

  optional string name = 3 [
    (gnostic.openapi.v3.property) = {
      description: "路由命名，然后我们可以使用 name 而不是 path 来传递 to 属性给 <router-link>。"
    }
  ]; // 路由命名，然后我们可以使用 name 而不是 path 来传递 to 属性给 <router-link>。

  optional string component = 4 [
    (gnostic.openapi.v3.property) = {
      description: "指向的组件"
    }
  ]; // 指向的组件

  optional RouteMeta meta = 5 [
    (gnostic.openapi.v3.property) = {
      description: "路由元信息"
    }
  ]; // 路由元信息

  repeated RouteItem children = 101 [
    (gnostic.openapi.v3.property) = {description: "子节点树"}
  ]; // 子节点树
}

message RouteMeta {
  optional string title = 1; //菜单标题
  optional string icon = 2; //菜单图标
  optional bool alwaysShow = 4;//【目录】只有一个子路由是否始终显示
  optional bool hidden = 5; // 是否隐藏(true-是 false-否)
  optional bool keepAlive = 6; //【菜单】是否开启页面缓存
  repeated RouteParams params = 7; // 参数
}

message RouteParams {
  optional string key = 1; //key
  optional string value = 2; //value
}

message UserProfileForm {
  string userName = 1 [
    (gnostic.openapi.v3.property) = {description: "用户名"}
  ]; // 用户名
  string nickName = 2 [
    (gnostic.openapi.v3.property) = {description: "昵称"}
  ]; // 昵称
  string avatar = 3 [
    (gnostic.openapi.v3.property) = {description: "头像URL"}
  ]; // 头像URL
  int32 gender = 4 [
    (gnostic.openapi.v3.property) = {description: "性别"}
  ]; // 性别
  string phone = 5 [
    (gnostic.openapi.v3.property) = {description: "手机号"}
  ]; // 手机号

  string roleName = 10 [
    (gnostic.openapi.v3.property) = {description: "角色名"}
  ];  // 角色名

  string deptName = 11 [
    (gnostic.openapi.v3.property) = {description: "部门名"}
  ];  // 部门名

  string createdAt = 200 [
    (gnostic.openapi.v3.property) = {description: "创建时间"}
  ];// 创建时间
}

// 修改密码表单
message UpdatePwdForm {
  string oldPwd = 1 [
    (gnostic.openapi.v3.property) = {description: "原密码"}
  ]; // 原密码
  string newPwd = 2 [
    (gnostic.openapi.v3.property) = {description: "新密码"}
  ]; // 新密码
  string confirmPwd = 3 [
    (gnostic.openapi.v3.property) = {description: "确认密码"}
  ]; // 确认密码
}

// 发送手机验证码表单
message SendUpdatePhoneCodeForm {
  string phone = 1 [
    (gnostic.openapi.v3.property) = {description: "手机号"}
  ]; // 手机号
}

// 修改手机表单
message UpdatePhoneForm {
  string phone = 1 [
    (gnostic.openapi.v3.property) = {description: "手机号"}
  ]; // 手机号
  string code = 2 [
    (gnostic.openapi.v3.property) = {description: "验证码"}
  ]; // 验证码
}
