syntax = "proto3";

package admin;

option go_package = "gitee.com/liujit/shop/server/api/admin;admin";

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

import "common/common.proto";
import "common/enum.proto";

// Admin角色管理服务
service BaseRoleService {
  // 查询角色下拉选择
  rpc OptionBaseRole (google.protobuf.Empty) returns (common.SelectOptionResponse) {
    option (google.api.http) = {
      get: "/api/admin/base/role/option"
    };
  }

  // 查询角色分页列表
  rpc PageBaseRole (PageBaseRoleRequest) returns (PageBaseRoleResponse) {
    option (google.api.http) = {
      get: "/api/admin/base/role"
    };
  }

  // 查询角色
  rpc GetBaseRole (google.protobuf.Int64Value) returns (BaseRoleForm) {
    option (google.api.http) = {
      get: "/api/admin/base/role/{value}"
    };
  }

  // 创建角色
  rpc CreateBaseRole (BaseRoleForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/admin/base/role"
      body: "*"
    };
  }

  // 更新角色
  rpc UpdateBaseRole (BaseRoleForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/base/role/{id}"
      body: "*"
    };
  }

  // 删除角色
  rpc DeleteBaseRole (google.protobuf.StringValue) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/admin/base/role/{value}"
    };
  }

  // 设置状态
  rpc SetBaseRoleStatus (common.SetStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/base/role/{id}/status"
      body: "*"
    };
  }

  // 设置角色菜单权限
  rpc SetBaseRoleMenus (SetMenusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/base/role/{id}/menus"
      body: "*"
    };
  }
}

message PageBaseRoleRequest {

  string name = 2 [
    (gnostic.openapi.v3.property) = {description: "角色名称"}
  ];  // 角色名称

  string code = 3 [
    (gnostic.openapi.v3.property) = {description: "角色编号"}
  ];  // 角色编号

  optional common.Status status = 100 [
    (gnostic.openapi.v3.property) = {description: "状态"}
  ];  // 状态

  // 当前页码
  int64 pageNum = 101 [
    (gnostic.openapi.v3.property) = {
      description: "当前页码",
      default: {number: 1}
    }
  ];

  // 每一页的行数
  int64 pageSize = 102 [
    (gnostic.openapi.v3.property) = {
      description: "每一页的行数",
      default: {number: 10}
    }
  ];
}

message PageBaseRoleResponse {
  // 分页数据
  repeated BaseRole list = 1;
  // 总数
  int32 total = 2;
}

// 角色
message BaseRole {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "角色ID"}
  ];  // 角色ID

  string name = 2 [
    (gnostic.openapi.v3.property) = {description: "角色名称"}
  ];  // 角色名称

  string code = 3 [
    (gnostic.openapi.v3.property) = {description: "角色编号"}
  ];  // 角色编号

  common.BaseRoleDataScope dataScope = 4 [
    (gnostic.openapi.v3.property) = {description: "数据权限：1全部数据2部门及子部门数据3本部门数据4本人数据"}
  ];  // 数据权限：0全部数据1部门及子部门数据2本部门数据3本人数据

  repeated int64 menus = 5 [
    (gnostic.openapi.v3.property) = {description: "分配的菜单列表"}
  ];  // 分配的菜单列表

  common.Status status = 100 [
    (gnostic.openapi.v3.property) = {description: "状态"}
  ];  // 状态

  string remark = 101 [
    (gnostic.openapi.v3.property) = {description: "备注"}
  ];  // 备注

  string createdAt = 200 [
    (gnostic.openapi.v3.property) = {description: "创建时间"}
  ];// 创建时间
  string updatedAt = 201 [
    (gnostic.openapi.v3.property) = {description: "更新时间"}
  ];// 更新时间
}

// 角色
message BaseRoleForm {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "角色ID"}
  ];  // 角色ID

  string name = 2 [
    (gnostic.openapi.v3.property) = {description: "角色名称"}
  ];  // 角色名称

  string code = 3 [
    (gnostic.openapi.v3.property) = {description: "角色编号"}
  ];  // 角色编号

  optional common.BaseRoleDataScope dataScope = 4 [
    (gnostic.openapi.v3.property) = {description: "数据权限：0全部数据1部门及子部门数据2本部门数据3本人数据"}
  ];  // 数据权限：0全部数据1部门及子部门数据2本部门数据3本人数据

  repeated int64 menus = 5 [
    (gnostic.openapi.v3.property) = {description: "分配的菜单列表"}
  ];  // 分配的菜单列表

  optional common.Status status = 51 [
    (gnostic.openapi.v3.property) = {description: "状态"}
  ];  // 状态

  string remark = 101 [
    (gnostic.openapi.v3.property) = {description: "备注"}
  ];  // 备注
}

message SetMenusRequest {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "用户ID"}
  ];  // 用户ID

  repeated int64 menus = 2 [
    (gnostic.openapi.v3.property) = {description: "分配的菜单列表"}
  ];  // 分配的菜单列表
}
