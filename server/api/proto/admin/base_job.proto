syntax = "proto3";

package admin;

option go_package = "gitee.com/liujit/shop/server/api/admin;admin";

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/wrappers.proto";

import "common/common.proto";
import "common/enum.proto";

// Admin定时任务服务
service BaseJobService {
  // 查询定时任务分页列表
  rpc PageBaseJob (PageBaseJobRequest) returns (PageBaseJobResponse) {
    option (google.api.http) = {
      get: "/api/admin/base/job"
    };
  }

  // 查询定时任务
  rpc GetBaseJob (google.protobuf.Int64Value) returns (BaseJobForm) {
    option (google.api.http) = {
      get: "/api/admin/base/job/{value}"
    };
  }

  // 创建定时任务
  rpc CreateBaseJob (BaseJobForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/admin/base/job"
      body: "*"
    };
  }

  // 更新定时任务
  rpc UpdateBaseJob (BaseJobForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/base/job/{id}"
      body: "*"
    };
  }

  // 删除定时任务
  rpc DeleteBaseJob (google.protobuf.StringValue) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/admin/base/job/{value}"
    };
  }

  // 设置状态
  rpc SetBaseJobStatus (common.SetStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/base/job/{id}/status"
      body: "*"
    };
  }

  // 启动任务
  rpc StartBaseJob (StartBaseJobRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/base/job/{id}/start"
      body: "*"
    };
  }

  // 停止任务
  rpc StopBaseJob (StopBaseJobRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/base/job/{id}/stop"
      body: "*"
    };
  }

  // 执行任务
  rpc ExecBaseJob (ExecBaseJobRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/base/job/{id}/exec"
      body: "*"
    };
  }

  // 查询定时任务日志分页列表
  rpc PageBaseJobLog (PageBaseJobLogRequest) returns (PageBaseJobLogResponse) {
    option (google.api.http) = {
      get: "/api/admin/base/job-log"
    };
  }

  // 查询定时任务日志
  rpc GetBaseJobLog (google.protobuf.Int64Value) returns (BaseJobLog) {
    option (google.api.http) = {
      get: "/api/admin/base/job-log/{value}"
    };
  }
}

message PageBaseJobRequest {
  // 任务名称
  string name = 2 [
    (gnostic.openapi.v3.property) = {
      description: "任务名称",
    }
  ];

  // 调用目标
  string invokeTarget = 3 [
    (gnostic.openapi.v3.property) = {
      description: "调用目标",
    }
  ];

  // 状态
  optional common.Status status = 100 [
    (gnostic.openapi.v3.property) = {
      description: "状态"
    }
  ];

  // 当前页码
  int64 pageNum = 101 [
    (gnostic.openapi.v3.property) = {
      description: "当前页码",
      default: {number: 1}
    }
  ];

  // 每一页的行数
  int64 pageSize = 102 [
    (gnostic.openapi.v3.property) = {
      description: "每一页的行数",
      default: {number: 10}
    }
  ];
}

message PageBaseJobResponse {
  // 分页数据
  repeated BaseJob list = 1;
  // 总数
  int32 total = 2;
}

message StartBaseJobRequest {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "主键id"}
  ];  // 主键id
}

message StopBaseJobRequest {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "主键id"}
  ];  // 主键id
}

message ExecBaseJobRequest {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "主键id"}
  ];  // 主键id
}


message BaseJobArgs {
  // 参数
  string key = 1 [
    (gnostic.openapi.v3.property) = {
      description: "参数",
    }
  ];

  // 值
  string value = 2 [
    (gnostic.openapi.v3.property) = {
      description: "值",
    }
  ];
}


// 定时任务
message BaseJob {
  // 任务ID
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {
      description: "任务ID"
    }
  ];

  // 任务名称
  string name = 2 [
    (gnostic.openapi.v3.property) = {
      description: "任务名称",
    }
  ];

  // 调用目标
  string invokeTarget = 3 [
    (gnostic.openapi.v3.property) = {
      description: "调用目标",
    }
  ];

  // 目标参数
  repeated BaseJobArgs args = 4 [
    (gnostic.openapi.v3.property) = {
      description: "目标参数",
    }
  ];

  // cron表达式
  string cronExpression = 5 [
    (gnostic.openapi.v3.property) = {
      description: "cron表达式",
    }
  ];

  // job启动时返回的id
  int32 entryId = 6 [
    (gnostic.openapi.v3.property) = {
      description: "job启动时返回的id"
    }
  ];

  // 状态
  common.Status status = 100 [
    (gnostic.openapi.v3.property) = {
      description: "状态"
    }
  ];

  string createdAt = 200 [
    (gnostic.openapi.v3.property) = {description: "创建时间"}
  ];// 创建时间
  string updatedAt = 201 [
    (gnostic.openapi.v3.property) = {description: "更新时间"}
  ];// 更新时间
}

// 定时任务
message BaseJobForm {

  // 任务ID
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {
      description: "任务ID"
    }
  ];

  // 任务名称
  string name = 2 [
    (gnostic.openapi.v3.property) = {
      description: "任务名称",
    }
  ];

  // 调用目标
  string invokeTarget = 3 [
    (gnostic.openapi.v3.property) = {
      description: "调用目标",
    }
  ];

  // 目标参数
  repeated BaseJobArgs args = 4 [
    (gnostic.openapi.v3.property) = {
      description: "目标参数",
    }
  ];

  // cron表达式
  string cronExpression = 5 [
    (gnostic.openapi.v3.property) = {
      description: "cron表达式",
    }
  ];

  optional common.Status status = 100 [
    (gnostic.openapi.v3.property) = { description: "状态" }
  ];
}


message PageBaseJobLogRequest {
  int64 jobId = 2 [
    (gnostic.openapi.v3.property) = {
      description: "任务id"
    }
  ]; // 任务id

  // 状态
  optional common.BaseJobLogStatus status = 6 [
    (gnostic.openapi.v3.property) = {
      description: "状态"
    }
  ];
  repeated string executeTime = 8 [
    (gnostic.openapi.v3.property) = {description: "执行时间"}
  ];// 执行时间

  // 当前页码
  int64 pageNum = 101 [
    (gnostic.openapi.v3.property) = {
      description: "当前页码",
      default: {number: 1}
    }
  ];

  // 每一页的行数
  int64 pageSize = 102 [
    (gnostic.openapi.v3.property) = {
      description: "每一页的行数",
      default: {number: 10}
    }
  ];
}

message PageBaseJobLogResponse {
  // 分页数据
  repeated BaseJobLog list = 1;
  // 总数
  int32 total = 2;
}

// 定时任务日志
message BaseJobLog {
  // 任务日志ID
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {
      description: "任务日志ID",
    }
  ];

  // 任务ID
  int64 jobId = 2 [
    (gnostic.openapi.v3.property) = {
      description: "任务ID",
    }
  ];

  // 执行参数
  string input = 3 [
    (gnostic.openapi.v3.property) = {
      description: "执行参数",
      max_length: 255,
    }
  ];

  // 输出结果
  string output = 4 [
    (gnostic.openapi.v3.property) = {
      description: "输出结果",
    }
  ];

  // 错误信息
  string error = 5 [
    (gnostic.openapi.v3.property) = {
      description: "错误信息",
    }
  ];

  // 状态：1、成功。2、失败。
  common.BaseJobLogStatus status = 6 [
    (gnostic.openapi.v3.property) = {
      description: "状态：1、成功。2、失败。",
    }
  ];

  // 消耗时间/毫秒
  string processTime = 7 [
    (gnostic.openapi.v3.property) = {
      description: "消耗时间/毫秒",
    }
  ];

  // 执行时间
  string executeTime = 8 [
    (gnostic.openapi.v3.property) = {
      description: "执行时间",
    }
  ];
}
