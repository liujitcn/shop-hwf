syntax = "proto3";

package admin;

option go_package = "gitee.com/liujit/shop/server/api/admin;admin";

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

import "common/common.proto";
import "common/enum.proto";

// Admin菜单管理服务
service BaseMenuService {
  // 查询菜单树形列表
  rpc TreeBaseMenu (google.protobuf.Empty) returns (TreeBaseMenuResponse) {
    option (google.api.http) = {
      get: "/api/admin/base/menu/tree"
    };
  }

  // 查询菜单树形选择
  rpc OptionBaseMenu (OptionBaseMenuRequest) returns (common.TreeOptionResponse) {
    option (google.api.http) = {
      get: "/api/admin/base/menu/option"
    };
  }

  // 查询菜单
  rpc GetBaseMenu (google.protobuf.Int64Value) returns (BaseMenuForm) {
    option (google.api.http) = {
      get: "/api/admin/base/menu/{value}"
    };
  }

  // 创建菜单
  rpc CreateBaseMenu (BaseMenuForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/admin/base/menu"
      body: "*"
    };
  }

  // 更新菜单
  rpc UpdateBaseMenu (BaseMenuForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/base/menu/{id}"
      body: "*"
    };
  }

  // 删除菜单
  rpc DeleteBaseMenu (google.protobuf.StringValue) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/admin/base/menu/{value}"
    };
  }

  // 设置状态
  rpc SetBaseMenuStatus (common.SetStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/admin/base/menu/{id}/status"
      body: "*"
    };
  }
}

message TreeBaseMenuResponse {
  repeated BaseMenu list = 1;
}

message OptionBaseMenuRequest {
  optional int64 parentId = 1 [
    (gnostic.openapi.v3.property) = {description: "父级菜单ID"}
  ];  // 父级菜单ID
}

// 菜单
message BaseMenu {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {
      description: "菜单ID"
    }
  ]; // 菜单ID

  int64 parentId = 2 [
    (gnostic.openapi.v3.property) = {description: "父级菜单ID"}
  ];  // 父级菜单ID

  common.BaseMenuType type = 3 [
    (gnostic.openapi.v3.property) = {
      description: "菜单类型"
    }
  ]; // 菜单类型

  string path = 4 [
    (gnostic.openapi.v3.property) = {
      description: "路由地址"
    }
  ]; // 路由地址

  string name = 5 [
    (gnostic.openapi.v3.property) = {
      description: "路由命名，然后我们可以使用 name 而不是 path 来传递 to 属性给 <router-link>。"
    }
  ]; // 路由命名，然后我们可以使用 name 而不是 path 来传递 to 属性给 <router-link>。

  string component = 6 [
    (gnostic.openapi.v3.property) = {
      description: "组件路径"
    }
  ]; // 组件路径

  string redirect = 7 [
    (gnostic.openapi.v3.property) = {
      description: "重定向地址"
    }
  ]; // 重定向地址

  BaseMenuMeta meta = 8 [
    (gnostic.openapi.v3.property) = {
      description: "路由元信息"
    }
  ]; // 路由元信息

  int32 sort = 9 [
    (gnostic.openapi.v3.property) = { description: "排序" }
  ]; // 排序

  common.Status status = 100 [
    (gnostic.openapi.v3.property) = { description: "状态" }
  ]; // 状态

  string createdAt = 200 [
    (gnostic.openapi.v3.property) = {description: "创建时间"}
  ];// 创建时间
  string updatedAt = 201 [
    (gnostic.openapi.v3.property) = {description: "更新时间"}
  ];// 更新时间

  repeated BaseMenu children = 300 [
    (gnostic.openapi.v3.property) = {description: "子菜单"}
  ];  // 子菜单
}

// 菜单
message BaseMenuForm {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {
      description: "菜单ID"
    }
  ]; // 菜单ID

  optional int64 parentId = 2 [
    (gnostic.openapi.v3.property) = {description: "父级菜单ID"}
  ];  // 父级菜单ID

  optional common.BaseMenuType type = 3 [
    (gnostic.openapi.v3.property) = {
      description: "菜单类型"
    }
  ]; // 菜单类型

  string path = 4 [
    (gnostic.openapi.v3.property) = {
      description: "路由地址"
    }
  ]; // 路由地址

  string name = 5 [
    (gnostic.openapi.v3.property) = {
      description: "路由命名，然后我们可以使用 name 而不是 path 来传递 to 属性给 <router-link>。"
    }
  ]; // 路由命名，然后我们可以使用 name 而不是 path 来传递 to 属性给 <router-link>。

  string component = 6 [
    (gnostic.openapi.v3.property) = {
      description: "组件路径"
    }
  ]; // 组件路径

  string redirect = 7 [
    (gnostic.openapi.v3.property) = {
      description: "重定向地址"
    }
  ]; // 重定向地址

  BaseMenuMeta meta = 8 [
    (gnostic.openapi.v3.property) = {
      description: "路由元信息"
    }
  ]; // 路由元信息

  repeated string apis = 9 [
    (gnostic.openapi.v3.property) = {description: "分配的API列表"}
  ];  // 分配的API列表

  int32 sort = 50 [
    (gnostic.openapi.v3.property) = { description: "排序" }
  ]; // 排序

  optional common.Status status = 101 [
    (gnostic.openapi.v3.property) = { description: "状态" }
  ]; // 状态
}

message BaseMenuMeta {
  string title = 1 [
    (gnostic.openapi.v3.property) = {
      description: "菜单标题"
    }
  ]; //菜单标题
  optional string icon = 2 [
    (gnostic.openapi.v3.property) = {
      description: "菜单图标"
    }
  ]; //菜单图标
  optional bool alwaysShow = 4 [
    (gnostic.openapi.v3.property) = {
      description: "【目录】只有一个子路由是否始终显示"
    }
  ];//【目录】只有一个子路由是否始终显示
  optional bool hidden = 5 [
    (gnostic.openapi.v3.property) = {
      description: "是否隐藏(true-是 false-否)"
    }
  ]; // 是否隐藏(true-是 false-否)
  optional bool keepAlive = 6 [
    (gnostic.openapi.v3.property) = {
      description: "【菜单】是否开启页面缓存"
    }
  ]; //参数
  repeated BaseMenuParams params = 7 [
    (gnostic.openapi.v3.property) = {
      description: "参数"
    }
  ]; // 参数
}

message BaseMenuParams {
  string key = 1 [
    (gnostic.openapi.v3.property) = {
      description: "参数key"
    }
  ]; //key
  string value = 2 [
    (gnostic.openapi.v3.property) = {
      description: "参数value"
    }
  ]; //value
}
