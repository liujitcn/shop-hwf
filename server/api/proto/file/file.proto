syntax = "proto3";

package file;

option go_package = "gitee.com/liujit/shop/server/api/file;file";

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

// 文件服务
service FileService {
  // 多个文件上传
  rpc MultiUploadFile (MultiUploadFileRequest) returns (MultiUploadFileResponse) {
    option (google.api.http) = {
      post: "/api/file/multi"
      body: "*"
    };
  }
  // 单个文件上传
  rpc UploadFile (UploadFileInfo) returns (FileInfo) {
    option (google.api.http) = {
      post: "/api/file"
      body: "*"
    };
  }
  // 下载文件
  rpc DownloadFile (DownloadFileRequest) returns (google.protobuf.BytesValue)  {
    option (google.api.http) = {
      get: "/api/file"
    };
  }
}

message MultiUploadFileRequest {
  repeated UploadFileInfo files = 1 [
    (gnostic.openapi.v3.property) = { description: "上传文件信息" }
  ]; // 文件名
}

message MultiUploadFileResponse {
  repeated FileInfo files = 1 [
    (gnostic.openapi.v3.property) = { description: "文件上传结果" }
  ]; // 文件上传结果
}

message UploadFileInfo {
  string name = 1 [
    (gnostic.openapi.v3.property) = { description: "文件名" }
  ]; // 文件名
  string extname = 2 [
    (gnostic.openapi.v3.property) = { description: "文件扩展名" }
  ]; // 文件扩展名
  string path = 3 [
    (gnostic.openapi.v3.property) = { description: "文件路径" }
  ]; // 文件路径

  bytes content = 4 [
    (gnostic.openapi.v3.property) = { description: " 二进制内容将通过 base64 编码传输" }
  ]; //  二进制内容将通过 base64 编码传输
}

message DownloadFileRequest {
  string name = 1 [
    (gnostic.openapi.v3.property) = { description: "文件名" }
  ]; // 文件名
  string path = 2 [
    (gnostic.openapi.v3.property) = { description: "文件路径" }
  ]; // 文件路径
}

message FileInfo {
  string url = 1 [
    (gnostic.openapi.v3.property) = { description: "文件路径" }
  ]; // 文件路径
  string name = 2 [
    (gnostic.openapi.v3.property) = { description: "文件名" }
  ]; // 文件名
  string extname = 3 [
    (gnostic.openapi.v3.property) = { description: "文件扩展名" }
  ]; // 文件扩展名
}
