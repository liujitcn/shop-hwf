syntax = "proto3";

package common;

option go_package = "gitee.com/liujit/shop/server/api/common;common";

// 状态
enum Status{
  UNKNOWN = 0;
  ENABLE = 1; // 启用
  DISABLE = 2; // 禁用
}


// 系统配置位置
enum BaseConfigSite{
  UNKNOWN_BCS = 0;
  SYSTEM = 1; // 系统内使用
  ADMIN = 2; // 管理端
  APP = 3; // 移动端
}

// 系统配置类型
enum BaseConfigType{
  UNKNOWN_BCT = 0;
  TEXT = 1; // 文本
  IMAGE = 2; // 图片
  RICH_TEXT = 3; // 富文本
}

// 定时任务日志状态
enum BaseJobLogStatus{
  UNKNOWN_BJLS = 0;
  SUCCESS = 1; // 成功
  FAIL = 2; // 失败
}

// 菜单类型
enum BaseMenuType{
  UNKNOWN_MT = 0;
  FOLDER = 1; // 目录
  MENU = 2; // 菜单
  BUTTON = 3; // 按钮
  EXT_LINK = 4; // 外部链接
}

// 角色数据范围
enum BaseRoleDataScope{
  UNKNOWN_RDS = 0;
  ALL = 1; // 全部数据
  DEPT_AND_CHILDREN = 2; // 部门及子部门数据
  SELF_DEPT = 3; // 本部门数据
  SELF_USER = 4; // 本人数据
}

// 用户性别
enum BaseUserGender{
  UNKNOWN_BUG = 0;
  SECRET = 1; // 保密
  BOY = 2; // 男
  GIRL = 3; // 禁用
}

// 用户门店审核状态
enum UserStoreStatus{
  UNKNOWN_USS = 0;
  PENDING_REVIEW = 1; // 待审核
  FAILED_REVIEW = 2; // 审核失败
  APPROVED = 3; // 审核通过
}

// 商品状态
enum GoodsStatus{
  UNKNOWN_GS = 0;
  PUT_ON = 1; // 已上架
  PULL_OFF = 2; // 已下架
}

// 订单状态
enum OrderStatus{
  UNKNOWN_OS = 0;
  CREATED = 1; // 待付款
  PAID = 2; // 待发货
  SHIPPED = 3; // 待收货
  RECEIVED = 4; // 已完成
  REFUNDING = 97; // 已退款
  CANCELED = 98; // 已取消
  DELETED = 99; // 已删除
}

// 订单支付方式
enum OrderPayType{
  UNKNOWN_OPT = 0;
  ONLINE_PAY = 1; // 在线支付
  CASH_ON_DELIVERY = 2; // 货到付款
}

// 订单支付渠道
enum OrderPayChannel{
  UNKNOWN_OPC = 0;
  WX_PAY = 1; // 微信支付
  UNION_PAY = 2; // 银联支付
}

// 订单配送时间
enum OrderDeliveryTime{
  UNKNOWN_ODT = 0;
  ALL_TIME = 1; // 时间不限 (周一至周日)
  WEEKDAY = 2; // 工作日送 (周一至周五)
  WEEKEND = 3; // 周末配送 (周六至周日)
}

// 订单取消原因
enum OrderCancelReason{
  UNKNOWN_OCR = 0;
  CANCEL_GOODS_NO_STOCK = 1; // 商品无货
  CANCEL_SELF = 2; // 不想要了
  CANCEL_GOODS_ERROR = 3; // 商品信息填错了
  CANCEL_ADDRESS_ERROR = 4; // 地址信息填写错误
  CANCEL_GOODS_DISCOUNT = 5; // 商品降价
  CANCEL_OTHER = 6; // 其它
}

// 订单对帐状态
enum OrderBillStatus{
  UNKNOWN_OBS = 0;
  NO_CHECK = 1; // 未对账
  CHECK_SUCCESS = 2; // 对账成功
  CHECK_FAIL = 3; // 对账失败
}

// 订单退款原因
enum OrderRefundReason{
  UNKNOWN_ORR = 0;
  REFUND_GOODS_NO_STOCK = 1; // 商品无货
  REFUND_SELF = 2; // 不想要了
  REFUND_GOODS_ERROR = 3; // 商品信息填错了
  REFUND_ADDRESS_ERROR = 4; // 地址信息填写错误
  REFUND_GOODS_DISCOUNT = 5; // 商品降价
  REFUND_OTHER = 6; // 其它
}

// 轮播图位置
enum ShopBannerSite{
  UNKNOWN_SBS = 0;
  INDEX = 1; // 首页
  CATEGORY = 2; // 分类页
}

// 轮播图类型
enum ShopBannerType{
  UNKNOWN_SBT = 0;
  GOODS_DETAIL = 1; // 商品详情
  CATEGORY_DETAIL = 2; // 分类详情
  WEB_VIEW = 3; // H5链接
  MINI = 4; // 其他小程序
}

// 支付对账单状态
enum PayBillStatus{
  UNKNOWN_PBS = 0;
  NO_COMPARE = 1; // 未比对
  NO_ERROR = 2; // 无误差
  HAS_ERROR = 3; // 有误差
}