syntax = "proto3";

package app;

option go_package = "gitee.com/liujit/shop/server/api/app;app";

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

import "common/enum.proto";

// App用户门店管理服务
service UserStoreService {
  // 查询用户门店
  rpc GetUserStore (google.protobuf.Empty) returns (UserStore) {
    option (google.api.http) = {
      get: "/api/app/user/store"
    };
  }

  // 创建用户门店
  rpc CreateUserStore (UserStoreForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/app/user/store"
      body: "*"
    };
  }

  // 更新用户门店
  rpc UpdateUserStore (UserStoreForm) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/app/user/store/{id}"
      body: "*"
    };
  }
}

// 用户门店信息
message UserStore {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "用户门店ID"}
  ];  // 用户门店ID
  string name = 2 [
    (gnostic.openapi.v3.property) = {description: "门店名称"}
  ];  // 门店名称
  repeated string address = 3 [
    (gnostic.openapi.v3.property) = {description: "省市区"}
  ];  // 省市区
  string detail = 4 [
    (gnostic.openapi.v3.property) = {description: "详细地址"}
  ];  // 详细地址
  repeated string picture = 5 [
    (gnostic.openapi.v3.property) = {description: "门店照片"}
  ];  // 门店照片
  repeated string businessLicense = 6 [
    (gnostic.openapi.v3.property) = {description: "营业执照"}
  ];  // 营业执照
  repeated string addressName = 10 [
    (gnostic.openapi.v3.property) = {description: "省市区"}
  ];  // 省市区

  common.UserStoreStatus status = 51 [
    (gnostic.openapi.v3.property) = {description: "状态"}
  ];  // 状态

  string remark = 52 [
    (gnostic.openapi.v3.property) = {description: "备注名"}
  ]; // 备注名
}

// 用户门店信息
message UserStoreForm {
  int64 id = 1 [
    (gnostic.openapi.v3.property) = {description: "用户门店ID"}
  ];  // 用户门店ID
  string name = 2 [
    (gnostic.openapi.v3.property) = {description: "门店名称"}
  ];  // 门店名称
  repeated string address = 3 [
    (gnostic.openapi.v3.property) = {description: "省市区"}
  ];  // 省市区
  string detail = 4 [
    (gnostic.openapi.v3.property) = {description: "详细地址"}
  ];  // 详细地址
  repeated string picture = 5 [
    (gnostic.openapi.v3.property) = {description: "门店照片"}
  ];  // 门店照片
  repeated string businessLicense = 6 [
    (gnostic.openapi.v3.property) = {description: "营业执照"}
  ];  // 营业执照
  repeated string addressName = 10 [
    (gnostic.openapi.v3.property) = {description: "省市区"}
  ];  // 省市区
}
