syntax = "proto3";

package app;

option go_package = "gitee.com/liujit/shop/server/api/app;app";

import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/any.proto";
import "google/protobuf/wrappers.proto";

import "login/login.proto";

// App用户登录认证服务
service AuthService {
  // 登录
  rpc Login (login.LoginRequest) returns (login.LoginResponse) {
    option (google.api.http) = {
      post: "/api/app/auth/login"
      body: "*"
    };
  }
  // 微信登录
  rpc WxLogin (WxLoginRequest) returns (login.LoginResponse) {
    option (google.api.http) = {
      post: "/api/app/auth/login/wx"
      body: "*"
    };
  }

  // 获取已经登录的用户的数据
  rpc GetUserInfo (google.protobuf.Empty) returns (UserInfo) {
    option (google.api.http) = {
      get: "/api/app/auth/userInfo"
    };
  }

  // 修改个人中心用户信息
  rpc UpdateUserInfo (UpdateUserInfoRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/app/auth/userInfo"
      body: "*"
    };
  }

  // 手机号授权
  rpc PhoneAuth (PhoneAuthRequest) returns (PhoneAuthResponse) {
    option (google.api.http) = {
      put: "/api/app/auth/userInfo/phone"
      body: "*"
    };
  }
}

message UserInfo {
  string userName = 1 [
    (gnostic.openapi.v3.property) = {description: "用户账号"}
  ]; // 用户账号

  string nickName = 2 [
    (gnostic.openapi.v3.property) = {description: "用户昵称"}
  ]; // 用户昵称

  int32 gender = 3 [
    (gnostic.openapi.v3.property) = {description: "性别"}
  ]; // 性别

  string phone = 4 [
    (gnostic.openapi.v3.property) = {description: "手机号"}
  ]; // 手机号

  string avatar = 5 [
    (gnostic.openapi.v3.property) = {description: "头像"}
  ]; // 头像
}

// 微信后台登录 - 请求
message WxLoginRequest {
  string code = 1 [
    (gnostic.openapi.v3.property) = {description: "用户登录凭据"}
  ]; // 用户登录凭据
}


message UpdateUserInfoRequest {
  string nickName = 1 [
    (gnostic.openapi.v3.property) = {description: "昵称"}
  ]; // 昵称
  string avatar = 2 [
    (gnostic.openapi.v3.property) = {description: "头像URL"}
  ]; // 头像URL
  int32 gender = 3 [
    (gnostic.openapi.v3.property) = {description: "性别"}
  ]; // 性别
}


message PhoneAuthRequest {
  string code = 1 [
    (gnostic.openapi.v3.property) = {description: "授权信息"}
  ]; // 授权信息
}

message PhoneAuthResponse {
  string phone = 1 [
    (gnostic.openapi.v3.property) = {description: "手机号"}
  ]; // 手机号
}
