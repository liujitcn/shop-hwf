server:
  http:
    addr: 0.0.0.0:7001
    timeout: 10s
    enable_swagger: true
    enable_pprof: true
    cors:
      headers:
        - "X-Requested-With"
        - "Content-Type"
        - "Authorization"
      methods:
        - "GET"
        - "POST"
        - "PUT"
        - "DELETE"
        - "HEAD"
        - "OPTIONS"
      origins:
        - "*"
    middleware:
      enable_recovery: true
      enable_logging: true
      enable_tracing: true
      enable_validate: false
      enable_metadata: true
      enable_circuit_breaker: false

  grpc:
    addr: 0.0.0.0:6001
    timeout: 10s
    middleware:
      enable_recovery: true
      enable_logging: true
      enable_tracing: true
      enable_validate: false
      enable_metadata: true
      enable_circuit_breaker: false

  vue:
    addr: 0.0.0.0:7002
    timeout: 1s
    proxy:
      - isUrl: true
        prefix: '/api'
        addr: http://127.0.0.1:7001
      - isUrl: false
        prefix: '/shop'
        addr: data/shop
      - isUrl: false
        prefix:
        addr: ../web/dist
